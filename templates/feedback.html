<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feedback - Glowcity</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="bg-mesh">

    {% include 'partials/_navbar.html' %}

    <main class="page-content">
        <div class="container">
            {% include 'partials/_flash.html' %}
            <div class="form-card animate-fade-up">
                <div class="form-header">
                    <div class="icon-box" style="background: rgba(99, 102, 241, 0.1); padding: 15px; border-radius: 50%; display: inline-flex; margin-bottom: 20px;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="highlight"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    </div>
                    <h2>User Feedback</h2>
                    <p>We value your thoughts. Help us improve your experience.</p>
                </div>

                <form action="/feedback" method="POST" class="modern-form">
                    <div class="grid-2" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                        <div class="form-group">
                            <label for="name">Your Name</label>
                            <input type="text" id="name" name="name" placeholder="John Doe" required class="form-input">
                        </div>
                        <div class="form-group">
                            <label for="email">Email Address</label>
                            <input type="email" id="email" name="email" placeholder="john@example.com" required class="form-input">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Your Rating</label>
                        <div class="star-rating">
                            <input type="radio" id="star5" name="rating" value="5" required /><label for="star5" title="5 stars"></label>
                            <input type="radio" id="star4" name="rating" value="4" /><label for="star4" title="4 stars"></label>
                            <input type="radio" id="star3" name="rating" value="3" /><label for="star3" title="3 stars"></label>
                            <input type="radio" id="star2" name="rating" value="2" /><label for="star2" title="2 stars"></label>
                            <input type="radio" id="star1" name="rating" value="1" /><label for="star1" title="1 star"></label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <input type="text" id="subject" name="subject" placeholder="General Feedback" required class="form-input">
                    </div>

                    <div class="form-group">
                        <label for="message">Your Message</label>
                        <textarea id="message" name="message" rows="5" placeholder="Tell us what you think..." required class="form-input"></textarea>
                    </div>

                    <button type="submit" class="primary-btn full-width submit-btn">
                        <span class="btn-text">Submit Feedback</span>
                    </button>
                </form>
            </div>
        </div>
    </main>

    {% include 'partials/_footer.html' %}
    {% include 'partials/_menu_script.html' %}
</body>
</html>
