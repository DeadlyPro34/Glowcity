{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <div class="site-flash-wrap">
      {% for category, message in messages %}
        <p class="site-flash site-flash-{{ category if category not in ['message', ''] else 'info' }}">{{ message }}</p>
      {% endfor %}
    </div>
  {% endif %}
{% endwith %}
